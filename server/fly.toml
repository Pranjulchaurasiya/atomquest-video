app = "atomquest-video-server"
primary_region = "bom"

[build]

[env]
  PORT = "3000"
  ANNOUNCED_IP = "atomquest-video-server.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
